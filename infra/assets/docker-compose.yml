# ClawForce OpenClaw Gateway - Docker Compose
#
# Environment variables (injected via .env file at deploy time):
#   AWS_REGION              - AWS region for Bedrock API (used by AWS SDK)
#   AWS_DEFAULT_REGION      - Fallback region
#   OPENCLAW_GATEWAY_TOKEN  - Gateway auth token (required for --bind lan)
#
# Model config lives in openclaw.json (agents.defaults.model.primary),
# NOT in env vars — this ensures openclaw.json is the single source of truth.

services:
  openclaw-gateway:
    image: openclaw:local
    environment:
      HOME: /home/node
      TERM: xterm-256color
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]

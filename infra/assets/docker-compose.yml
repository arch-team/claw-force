# ClawForce OpenClaw Gateway - Docker Compose
#
# Environment variables (injected via .env file at deploy time):
#   AWS_REGION          - AWS region for Bedrock API
#   AWS_DEFAULT_REGION  - Fallback region
#   OPENCLAW_MODEL      - Bedrock model ID (Inference Profile format)

services:
  openclaw-gateway:
    image: openclaw:local
    environment:
      HOME: /home/node
      TERM: xterm-256color
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      OPENCLAW_MODEL: ${OPENCLAW_MODEL}
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    ports:
      - "18789:18789"
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
